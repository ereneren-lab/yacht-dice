<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요트 다이스</title>
<style>
  :root{
    --bg:#15111f; --panel:#1f1930; --panel2:#272038; --line:rgba(255,255,255,.08);
    --ink:#f0ebf5; --muted:#9b91b5; --accent:#aef359; --accent-ink:#15110f;
    --gold:#ffd45e; --ai:#4ec3ff; --danger:#ff5d6c; --ui:1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:transparent;color:var(--ink);
    font-family:"Pretendard","Space Grotesk",-apple-system,system-ui,"Segoe UI","Apple SD Gothic Neo",sans-serif;
    min-height:100%;display:flex;flex-direction:column;align-items:center;padding:12px;-webkit-tap-highlight-color:transparent}
  #root{position:relative;opacity:var(--ui);transition:opacity .12s;width:100%;max-width:960px;display:flex;flex-direction:column;align-items:center}
  .bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(1200px 600px at 50% -10%, #2a2142 0%, transparent 60%), #15111f}
  .app{width:100%;display:flex;flex-direction:column;align-items:stretch;gap:12px}

  .topbar{display:flex;align-items:center;justify-content:space-between;-webkit-app-region:drag}
  .topbar button,.topbar input{-webkit-app-region:no-drag}
  .title{font-size:22px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:9px}
  .title .dot{width:11px;height:11px;border-radius:3px;background:var(--accent);box-shadow:0 0 14px var(--accent)}
  .title small{font-size:12px;color:var(--muted);font-weight:600}

  .opacityctl{position:fixed;top:12px;right:12px;z-index:9999;display:flex;align-items:center;gap:10px;-webkit-app-region:no-drag;
    background:rgba(31,25,48,.96);border:1px solid var(--line);border-radius:999px;padding:9px 14px;box-shadow:0 8px 24px rgba(0,0,0,.45);backdrop-filter:blur(6px)}
  .opacityctl span{font-size:15px}
  .opacityctl input[type=range]{-webkit-appearance:none;appearance:none;width:120px;height:26px;background:transparent;cursor:pointer;margin:0}
  .opacityctl input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:999px;background:var(--panel2)}
  .opacityctl input[type=range]::-moz-range-track{height:6px;border-radius:999px;background:var(--panel2)}
  .opacityctl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;margin-top:-8px;border-radius:50%;background:var(--accent);border:2px solid #15110f;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .opacityctl input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--accent);border:2px solid #15110f}
  .wbtn{display:none;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;border:none;cursor:pointer;background:var(--panel2);color:var(--ink);font-size:13px;font-family:inherit}
  .wbtn:hover{background:#3a3052}
  .wbtn.on{background:var(--accent);color:var(--accent-ink)}
  #winClose:hover{background:var(--danger);color:#fff}

  .card{background:rgba(31,25,48,.97);border-radius:18px;padding:20px;box-shadow:0 18px 40px rgba(0,0,0,.4),inset 0 0 0 1px var(--line);width:100%;max-width:460px;align-self:center}
  .lbl{font-size:11px;letter-spacing:.12em;color:var(--muted);margin:0 0 9px}
  .lbl.mt{margin-top:16px}
  .chips{display:flex;gap:8px}
  .chips button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:11px;padding:11px 4px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .12s}
  .chips button.on{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  .modedesc{color:var(--muted);font-size:12.5px;margin-top:9px;line-height:1.5}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tabs button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:11px;padding:11px 0;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
  .tabs button.on{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  .names{display:flex;flex-direction:column;gap:9px}
  .names .row{display:flex;align-items:center;gap:9px}
  .names .pill{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none;color:#15110f}
  input.txt{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 13px;font-size:15px;font-family:inherit}
  input.txt:focus{outline:2px solid var(--accent);border-color:transparent}
  .seg{display:flex;flex:none;background:var(--panel2);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:transparent;border:none;color:var(--muted);font-family:inherit;font-weight:700;font-size:12.5px;padding:9px 11px;cursor:pointer}
  .seg button.on{background:var(--accent);color:var(--accent-ink)}
  .seg button.on.ai{background:var(--ai);color:#06222e}
  .optrow{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
  .toggle{display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--muted);font-size:14px;font-weight:600}
  .switch{width:42px;height:24px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);position:relative;transition:background .15s}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:all .15s}
  .toggle.on .switch{background:var(--accent)}
  .toggle.on .switch::after{left:21px;background:var(--accent-ink)}
  .btn{width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 6px 18px rgba(174,243,89,.26);transition:transform .08s,opacity .12s;margin-top:18px}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:var(--panel2);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
  .btn:disabled{opacity:.45;cursor:default}
  .row2{display:flex;gap:9px;margin-top:14px}
  .row2 .btn{margin-top:0}
  .roomcode{font-size:30px;font-weight:800;letter-spacing:.18em;text-align:center;background:var(--panel2);border-radius:12px;padding:14px;margin:4px 0 4px;color:var(--accent)}
  .members{display:flex;flex-direction:column;gap:8px}
  .member{display:flex;align-items:center;gap:10px;background:var(--panel2);border-radius:10px;padding:10px 12px;font-weight:600}
  .member .swatch{width:12px;height:12px;border-radius:4px;flex:none}
  .member .host{font-size:10px;font-weight:800;letter-spacing:.04em;background:var(--gold);color:#3a2a00;padding:2px 6px;border-radius:5px;margin-left:auto}
  .neterr{color:var(--danger);font-size:13px;margin-top:10px;text-align:center;min-height:16px}

  /* ===== game: wide one-screen layout ===== */
  #game{display:none}
  .gamewrap{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
  .leftcol{width:320px;flex:none;display:flex;flex-direction:column;gap:11px}
  .rightcol{flex:1;min-width:280px}
  .pane{background:rgba(31,25,48,.97);border-radius:14px;box-shadow:inset 0 0 0 1px var(--line)}

  .turnbar{display:flex;align-items:center;justify-content:space-between;padding:12px 15px}
  .turnbar .who{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:700}
  .turnbar .swatch{width:14px;height:14px;border-radius:4px;flex:none}
  .aitag{font-size:10px;font-weight:800;background:var(--ai);color:#06222e;padding:2px 6px;border-radius:5px}
  .youtag{font-size:10px;font-weight:800;background:var(--accent);color:var(--accent-ink);padding:2px 6px;border-radius:5px}
  .turnbar .rolls{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}
  .turnbar .pips{display:flex;gap:5px}
  .turnbar .pips i{width:9px;height:9px;border-radius:50%;background:var(--panel2);box-shadow:inset 0 0 0 1px var(--line)}
  .turnbar .pips i.live{background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .timerbar{height:6px;border-radius:999px;background:var(--panel2);overflow:hidden;box-shadow:inset 0 0 0 1px var(--line)}
  .timerbar i{display:block;height:100%;width:100%;background:var(--accent);transition:width .1s linear,background .3s}

  .dicepane{padding:20px 14px 16px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .dice2d{display:flex;gap:11px;justify-content:center}
  .d2{width:46px;height:46px;border-radius:11px;background:linear-gradient(145deg,#f6f2e7,#e3dccb);
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:8px;cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.32),inset 0 0 0 1px rgba(0,0,0,.06);transition:transform .12s,box-shadow .14s}
  .d2 .c{display:flex;align-items:center;justify-content:center}
  .d2 .p{width:60%;aspect-ratio:1;border-radius:50%;background:#16121d}
  .d2.held{box-shadow:0 0 0 3px var(--gold),0 0 16px rgba(255,212,94,.55);transform:translateY(-7px)}
  .d2.blank{background:linear-gradient(145deg,#322a48,#231d33)}
  .d2.rolling{animation:wob .18s infinite}
  .d2.land{animation:land .18s}
  .d2.lock{cursor:default}
  @keyframes wob{0%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-3px) rotate(4deg)}100%{transform:translateY(0) rotate(-4deg)}}
  @keyframes land{0%{transform:translateY(-3px)}100%{transform:translateY(0)}}
  .rollbtn{max-width:280px}
  .hint{color:var(--muted);font-size:12.5px;text-align:center;min-height:16px;padding:0 6px}

  .sheetwrap{overflow-x:auto;border-radius:14px;box-shadow:inset 0 0 0 1px var(--line);background:rgba(31,25,48,.97)}
  table{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
  th,td{text-align:center;font-size:13px}
  thead th{position:sticky;top:0;background:#241d37;padding:9px 6px;font-size:12.5px;font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap}
  thead th .swatch{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle}
  th.catcol,td.catcol{position:sticky;left:0;background:#241d37;text-align:left;padding:7px 12px;color:var(--muted);font-weight:600;white-space:nowrap;min-width:96px;border-right:1px solid var(--line)}
  tbody td{padding:6px;border-bottom:1px solid rgba(255,255,255,.04);min-width:50px}
  td.val{color:var(--ink);font-weight:700}
  td.empty{color:transparent}
  td.preview{color:var(--accent);font-weight:700;cursor:pointer;background:rgba(174,243,89,.08)}
  td.preview:hover{background:rgba(174,243,89,.18)}
  td.preview.zero{color:var(--muted)}
  td.lock{cursor:default}
  .col-current{background:rgba(174,243,89,.05)}
  tr.bonus td,tr.bonus td.catcol{color:var(--gold)}
  tr.total td{font-size:15px;font-weight:800;color:var(--ink);border-top:1px solid var(--line);padding:9px 6px}

  .overlay{position:fixed;inset:0;background:rgba(13,10,20,.86);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px;z-index:30}
  .overlay.show{display:flex}
  .result{background:var(--panel);border-radius:20px;padding:26px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .result h2{font-size:23px;font-weight:800;text-align:center;margin-bottom:4px}
  .result .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}
  .rank{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;background:var(--panel2);margin-bottom:8px}
  .rank.first{background:linear-gradient(100deg,rgba(255,212,94,.18),rgba(255,212,94,.04));box-shadow:inset 0 0 0 1px rgba(255,212,94,.35)}
  .rank .pos{width:26px;font-size:17px;font-weight:800;text-align:center;flex:none}
  .rank .swatch{width:13px;height:13px;border-radius:4px;flex:none}
  .rank .nm{flex:1;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rank .pts{font-weight:800}
  .result .btns{display:flex;flex-direction:column;gap:9px;margin-top:18px}
  .result .btn{margin-top:0}

  @media(max-width:700px){ .leftcol{width:100%} .rightcol{width:100%} }

  .statsbar{display:flex;gap:6px;margin-bottom:16px;align-items:stretch}
  .statsbar .stat{flex:1;background:var(--panel2);border-radius:10px;padding:8px 4px;text-align:center}
  .statsbar .stat b{display:block;font-size:17px;color:var(--accent);line-height:1.1}
  .statsbar .stat span{font-size:10px;color:var(--muted)}
  .statsbar .reset{font-size:11px;color:var(--muted);text-decoration:underline;cursor:pointer;align-self:center;padding:0 4px}
  .tbctrls{display:flex;align-items:center;gap:8px}
  .iconbtn{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;background:var(--panel2);color:var(--ink);font-size:14px;display:flex;align-items:center;justify-content:center;flex:none}
  .iconbtn:hover{background:#3a3052}
  #leaveBtn:hover{background:var(--danger);color:#fff}
  .member .conn{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none}
  .member .conn.off{background:var(--danger)}
  .member.off{opacity:.5}
  .member .mname{display:flex;align-items:center;gap:6px}
  .member .host{font-size:10px;font-weight:800;background:var(--gold);color:#3a2a00;padding:2px 6px;border-radius:5px}
  .member .rm{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:13px}
  .member .rm:hover{color:var(--danger)}

  /* avatars */
  .av{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:19px;background:var(--panel2);box-shadow:inset 0 0 0 2px rgba(255,255,255,.14);flex:none;line-height:1}
  .av.sm{width:26px;height:26px;font-size:15px}
  .av.cur{box-shadow:0 0 0 2px var(--ring),0 0 12px var(--ring);animation:avpulse 1.5s infinite}
  @keyframes avpulse{0%,100%{box-shadow:0 0 0 2px var(--ring),0 0 4px 0 var(--ring)}50%{box-shadow:0 0 0 2px var(--ring),0 0 13px 2px var(--ring)}}
  /* turn banner */
  .turnbanner{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:13px;font-weight:800;font-size:16px}
  .turnbanner.me{background:linear-gradient(100deg,rgba(174,243,89,.22),rgba(174,243,89,.05));box-shadow:inset 0 0 0 1px rgba(174,243,89,.45);color:var(--accent)}
  .turnbanner.other{background:var(--panel2);color:var(--ink)}
  .turnbanner .nm{font-size:15px}
  /* sheet header avatar */
  thead th .hav{display:flex;flex-direction:column;align-items:center;gap:3px}
  thead th .hnm{font-size:11px;font-weight:700;max-width:62px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* dice toss + popups */
  .d2.toss{animation:toss .5s ease}
  @keyframes toss{0%{transform:translateY(-16px) rotate(var(--r,140deg))}100%{transform:translateY(0) rotate(0)}}
  td.justfill{animation:cellflash .8s}
  @keyframes cellflash{0%{background:var(--accent);color:#15110f}100%{background:transparent}}
  .scorepop{position:fixed;font-weight:800;color:var(--accent);font-size:22px;pointer-events:none;z-index:40;text-shadow:0 2px 10px rgba(0,0,0,.6);animation:pop 1s ease-out forwards}
  @keyframes pop{0%{opacity:0;transform:translateY(8px) scale(.8)}22%{opacity:1;transform:translateY(-2px) scale(1.15)}100%{opacity:0;transform:translateY(-34px) scale(1)}}
  /* reactions */
  .reactbar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
  .reactbar button{width:36px;height:36px;border-radius:10px;border:none;background:var(--panel2);font-size:18px;cursor:pointer}
  .reactbar button.phrase{width:auto;padding:0 11px;font-size:13px;font-weight:800;color:var(--ink)}
  .reactbar button:hover{background:#3a3052;transform:translateY(-2px)}
  .floatemo{position:fixed;font-size:40px;pointer-events:none;z-index:50;animation:floatup 3s ease-out forwards}
  .floatemo.txt{font-size:18px;font-weight:800;color:#fff;background:rgba(20,16,30,.92);padding:6px 12px;border-radius:14px;box-shadow:0 4px 14px rgba(0,0,0,.45);white-space:nowrap;animation:floatuptxt 3s ease-out forwards}
  @keyframes floatuptxt{0%{opacity:0;transform:translateX(-50%) translateY(0) scale(.8)}10%{opacity:1;transform:translateX(-50%) translateY(-10px) scale(1.05)}70%{opacity:1;transform:translateX(-50%) translateY(-60px) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-110px) scale(1)}}
  @keyframes floatup{0%{opacity:0;transform:translateY(0) scale(.5)}10%{opacity:1;transform:translateY(-10px) scale(1.15)}70%{opacity:1;transform:translateY(-60px) scale(1)}100%{opacity:0;transform:translateY(-110px) scale(1)}}
  /* help + breakdown */
  .helpwrap{max-height:58vh;overflow-y:auto;text-align:left;margin-bottom:6px}
  .helprow{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .helprow b{color:var(--ink);font-weight:700;white-space:nowrap}
  .helprow span{color:var(--muted);text-align:right}
  .hsec{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.06em;margin:12px 0 2px}
  .bd{display:flex;gap:9px;justify-content:center;font-size:11px;color:var(--muted);margin-top:4px}
  .bd b{color:var(--ink)}
  .newbest{display:inline-block;background:var(--gold);color:#3a2a00;font-weight:800;font-size:12px;padding:3px 10px;border-radius:999px;margin-top:6px}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:35}

  /* felt tray */
  .tray{position:relative;width:100%;max-width:330px;height:188px;margin:0 auto;border-radius:22px;padding:16px 14px;
    background:radial-gradient(ellipse at 50% 36%, #36996a, #1d6e45 64%, #155539);
    box-shadow:inset 0 0 0 8px #6e4a28, inset 0 0 22px rgba(0,0,0,.5), 0 10px 26px rgba(0,0,0,.45)}
  .keptzone{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed rgba(255,255,255,.22)}
  .keptzone .lbl2{font-size:10px;color:rgba(255,255,255,.6);font-weight:800;letter-spacing:.04em;height:13px}
  .keptrow{display:flex;gap:6px;justify-content:center;align-items:center;height:58px;flex-wrap:nowrap}
  .keptrow:empty::before{content:'고정한 주사위가 여기 모여요';font-size:10px;color:rgba(255,255,255,.35)}
  .d2.kept{transform:none}
  .d2{position:relative}
  .d2.flip{transition:transform .28s cubic-bezier(.2,.85,.3,1)}
  .d2:not(.lock):active{transform:scale(.94)!important}
  .d2.justheld{animation:heldpop .45s}
  @keyframes heldpop{0%{box-shadow:0 0 0 3px var(--gold),0 0 0 0 rgba(255,212,94,.75)}45%{box-shadow:0 0 0 3px var(--gold),0 0 24px 7px rgba(255,212,94,.75)}100%{box-shadow:0 0 0 3px var(--gold),0 0 16px rgba(255,212,94,.55)}}
  .d2 .pin{position:absolute;top:-7px;right:-7px;font-size:10px;background:var(--gold);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.45);z-index:2}
  .tray .dice2d{position:relative;display:flex;justify-content:center;align-items:center;gap:6px;flex-wrap:nowrap;height:58px}
  .d2{will-change:transform}
  /* sheet compact toggle */
  .sheettop{display:flex;justify-content:flex-end;margin-bottom:7px}
  .minibtn{background:var(--panel2);border:none;color:var(--muted);font-size:12px;font-weight:700;padding:7px 12px;border-radius:9px;cursor:pointer}
  .minibtn:hover{background:#3a3052;color:var(--ink)}
  .minibtn.on{background:var(--accent);color:var(--accent-ink)}

  .avgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:8px 0 4px}
  .avgrid button{aspect-ratio:1;border:none;border-radius:10px;background:var(--panel2);font-size:22px;cursor:pointer;line-height:1}
  .avgrid button:hover{background:#3a3052}
  .avgrid button.on{box-shadow:0 0 0 2px var(--accent)}
  .av.off{opacity:.42;filter:grayscale(.6)}
  thead th.me-col .hnm{color:var(--accent)}
  thead th.me-col{box-shadow:inset 3px 0 0 var(--accent)}
  thead th.col-current .hnm::before{content:'▸ ';color:var(--accent)}
  .specbar{background:linear-gradient(100deg,rgba(78,195,255,.2),rgba(78,195,255,.04));box-shadow:inset 0 0 0 1px rgba(78,195,255,.4);color:var(--ai)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  button,.d2,.iconbtn{touch-action:manipulation}
  .turnbar{flex-wrap:wrap;gap:8px}
  .tbctrls{flex-wrap:wrap;justify-content:flex-end}

  /* AI speech bubble */

<script>
/* === game-core.js (인라인: 외부 파일 없이도 동작) === */
/* game-core.js — 서버(Node)와 브라우저가 공유하는 요트 다이스 엔진
   UMD: Node에서는 module.exports, 브라우저에서는 window.GameCore */
(function (root, factory) {
  if (typeof module === 'object' && module.exports) module.exports = factory();
  else root.GameCore = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  // ---------- dice helpers ----------
  const cnt = d => { const c = [0,0,0,0,0,0,0]; d.forEach(v => { if (v>=1&&v<=6) c[v]++; }); return c; };
  const tot = d => d.reduce((a,b)=>a+b,0);
  const nKind = (d,n) => cnt(d).some(x=>x>=n);
  const maxKind = d => Math.max.apply(null, cnt(d));
  const isFull = d => { const c=cnt(d).filter(x=>x>0); return (c.indexOf(3)>=0&&c.indexOf(2)>=0)||cnt(d).some(x=>x===5); };
  const seqStr = d => [1,2,3,4,5,6].filter(v=>cnt(d)[v]>0).join('');
  const has4 = d => ['1234','2345','3456'].some(q=>seqStr(d).indexOf(q)>=0);
  const has5 = d => { const s=seqStr(d); return s.indexOf('12345')>=0||s.indexOf('23456')>=0; };
  const isExact = (d,a) => { const u=[1,2,3,4,5,6].filter(v=>cnt(d)[v]>0); return u.length===a.length&&u.every((v,i)=>v===a[i]); };
  const sumKind = (d,n) => { const c=cnt(d); for (let v=6;v>=1;v--) if (c[v]>=n) return v*n; return 0; };
  const up = (f,l) => ({ id:['','aces','twos','threes','fours','fives','sixes'][f], label:l, sec:'up', face:f, score:d=>cnt(d)[f]*f });
  const U = [up(1,'에이스'),up(2,'듀얼'),up(3,'트리플'),up(4,'쿼드'),up(5,'펜타'),up(6,'헥사')];

  const RULES = {
    yacht_kr:{ name:'요트 다이스', desc:'국내 앱 규칙. 포카드·풀하우스는 주사위 5개 합산, 상단 63점↑ 보너스 +35.', bonus:{th:63,pts:35}, cats:[...U,
      {id:'choice',label:'초이스',sec:'low',score:d=>tot(d)},
      {id:'fourKind',label:'포 오브 어 카인드',sec:'low',score:d=>nKind(d,4)?tot(d):0},
      {id:'fullHouse',label:'풀하우스',sec:'low',score:d=>isFull(d)?tot(d):0},
      {id:'sStraight',label:'스몰 스트레이트',sec:'low',score:d=>has4(d)?15:0},
      {id:'lStraight',label:'라지 스트레이트',sec:'low',score:d=>has5(d)?30:0},
      {id:'yacht',label:'요트',sec:'low',score:d=>maxKind(d)>=5?50:0}]},
    yahtzee:{ name:'야찌', desc:'해즈브로 Yahtzee 규칙. 풀하우스 25 / 스트레이트 30·40 고정, 트리플 추가. 보너스 +35.', bonus:{th:63,pts:35}, cats:[...U,
      {id:'threeKind',label:'쓰리 오브 어 카인드',sec:'low',score:d=>nKind(d,3)?tot(d):0},
      {id:'fourKind',label:'포 오브 어 카인드',sec:'low',score:d=>nKind(d,4)?tot(d):0},
      {id:'fullHouse',label:'풀하우스',sec:'low',score:d=>isFull(d)?25:0},
      {id:'sStraight',label:'스몰 스트레이트',sec:'low',score:d=>has4(d)?30:0},
      {id:'lStraight',label:'라지 스트레이트',sec:'low',score:d=>has5(d)?40:0},
      {id:'chance',label:'찬스',sec:'low',score:d=>tot(d)},
      {id:'yahtzee',label:'야찌',sec:'low',score:d=>maxKind(d)>=5?50:0}]},
    yacht_og:{ name:'오리지널', desc:'1938 원조 규칙. 포카드는 4개 합, 스트레이트는 1-5·2-6 정확히 30점, 보너스 없음.', bonus:{th:0,pts:0}, cats:[...U,
      {id:'fourKind',label:'포 오브 어 카인드',sec:'low',score:d=>maxKind(d)>=4?sumKind(d,4):0},
      {id:'fullHouse',label:'풀하우스',sec:'low',score:d=>isFull(d)?tot(d):0},
      {id:'sStraight',label:'리틀 스트레이트',sec:'low',score:d=>isExact(d,[1,2,3,4,5])?30:0},
      {id:'lStraight',label:'빅 스트레이트',sec:'low',score:d=>isExact(d,[2,3,4,5,6])?30:0},
      {id:'choice',label:'초이스',sec:'low',score:d=>tot(d)},
      {id:'yacht',label:'요트',sec:'low',score:d=>maxKind(d)>=5?50:0}]},
  };
  const UPPER_IDS=['aces','twos','threes','fours','fives','sixes'];
  const CEIL={yacht:50,yahtzee:50,lStraight:40,fullHouse:25,fourKind:24,sStraight:30,threeKind:18,choice:30,chance:30,
              aces:5,twos:10,threes:15,fours:20,fives:25,sixes:30};
  const DUMP=['aces','twos','yacht','yahtzee','threes','lStraight','sStraight','threeKind','fourKind','fullHouse','fours','fives','sixes','choice','chance'];

  function scoreOf(catId,d,rule){ const c=rule.cats.find(x=>x.id===catId); return c?c.score(d):0; }
  function emptyScores(rule){ const s={}; rule.cats.forEach(c=>s[c.id]=null); return s; }
  function openCats(rule,scores){ return rule.cats.filter(c=>scores[c.id]===null).map(c=>c.id); }
  function bestOpen(d,open,rule){ let b=0; for (const id of open){ const s=scoreOf(id,d,rule); if (s>b) b=s; } return b; }

  // ---------- AI ----------
  const HI=['yacht','yahtzee','lStraight','sStraight','fullHouse','fourKind'];
  const PERSONAS={ safe:{label:'안정',wHi:1.0,wUp:1.0,noise:0}, aggro:{label:'공격',wHi:1.55,wUp:1.0,noise:0.05}, bonus:{label:'보너스',wHi:1.0,wUp:1.6,noise:0}, gambler:{label:'도박',wHi:1.3,wUp:1.0,noise:0.35} };
  const PK=Object.keys(PERSONAS);
  function pw(id,per){ if(UPPER_IDS.indexOf(id)>=0)return per.wUp; if(HI.indexOf(id)>=0)return per.wHi; return 1; }
  function bestOpenW(d,open,rule,per){ let b=0; for(const id of open){ const s=scoreOf(id,d,rule)*pw(id,per); if(s>b)b=s; } return b; }
  function aiHoldMask(d, open, rule, diff, per){
    per=per||PERSONAS.safe;
    if (diff==='easy' && Math.random()<0.3) return Math.floor(Math.random()*32);
    if (per.noise && Math.random()<per.noise) return Math.floor(Math.random()*32);
    const N = diff==='hard'?60 : diff==='easy'?16 : 32;
    let bm=0, bev=-1;
    for (let m=0;m<32;m++){
      let ev=0;
      for (let s=0;s<N;s++){ const t=d.map((v,i)=>(m>>i&1)?v:1+Math.floor(Math.random()*6)); ev+=bestOpenW(t,open,rule,per); }
      ev/=N; if (ev>bev){ bev=ev; bm=m; }
    }
    return bm;
  }
  function aiHoldMask_OLD(d, open, rule, diff){
    if (diff==='easy' && Math.random()<0.3) return Math.floor(Math.random()*32);
    const N = diff==='hard'?60 : diff==='easy'?16 : 32;
    let bm=0, bev=-1;
    for (let m=0;m<32;m++){
      let ev=0;
      for (let s=0;s<N;s++){ const t=d.map((v,i)=>(m>>i&1)?v:1+Math.floor(Math.random()*6)); ev+=bestOpen(t,open,rule); }
      ev/=N; if (ev>bev){ bev=ev; bm=m; }
    }
    return bm;
  }
  function aiPickCat(d, open, rule, scores, diff, per){
    per=per||PERSONAS.safe;
    const scored = open.map(id=>({id, s:scoreOf(id,d,rule)}));
    if (diff==='easy'){ scored.sort((a,b)=>b.s-a.s); return scored[0].id; }
    const curUpper = UPPER_IDS.reduce((a,id)=>a+(scores[id]||0),0);
    function value(id,s){
      let v=s;
      if (rule.bonus.pts>0 && UPPER_IDS.indexOf(id)>=0){
        const face=UPPER_IDS.indexOf(id)+1, par=face*3;
        v += (s-par)*1.4;
        if (curUpper<rule.bonus.th && curUpper+s>=rule.bonus.th) v+=18;
      }
      if (s===0) v -= (CEIL[id]||0)*0.5;
      v *= pw(id,per);
      if (per.noise) v += (Math.random()-0.5)*per.noise*30;
      return v;
    }
    if (scored.every(o=>o.s===0)){ for (const id of DUMP) if (open.indexOf(id)>=0) return id; }
    let best=scored[0], bv=-1e9;
    scored.forEach(o=>{ const v=value(o.id,o.s); if (v>bv){ bv=v; best=o; } });
    return best.id;
  }

  // ---------- engine ----------
  const now = () => Date.now();
  class GameEngine {
    constructor(opts){
      this.rule = RULES[opts.mode] ? opts.mode : 'yacht_kr';
      this.mode = this.rule; this.rule = RULES[this.mode];
      this.difficulty = opts.difficulty || 'normal';
      this.TURN_MS = opts.turnMs || 45000;
      this.AID = opts.aiFast ? 0.45 : 1;   // AI 템포 배수
      this.rng = opts.rng || Math.random;
      this.onState = opts.onState || function(){};
      this.onRoll = opts.onRoll || function(){};
      this.players = (opts.players||[]).map(p=>({ pid:p.pid, name:p.name, color:p.color, avatar:p.avatar||null, ai:!!p.ai, persona: p.ai?(PERSONAS[p.persona]?p.persona:PK[Math.floor(Math.random()*PK.length)]):null, connected:p.connected!==false, scores:emptyScores(this.rule) }));
      this.phase='play'; this.current=0; this.rollsLeft=3; this.rolled=false;
      this.dice=[0,1,2,3,4].map(()=>({value:0,held:false}));
      this.deadline=0; this._timer=null; this._busy=false; this._dead=false;
    }
    start(){ this.phase='play'; this.current=0; this.players.forEach(p=>p.scores=emptyScores(this.rule)); this._beginTurn(); }
    destroy(){ this._dead=true; if(this._timer){clearTimeout(this._timer);this._timer=null;} }
    _d6(){ return 1+Math.floor(this.rng()*6); }
    _seat(pid){ return this.players.findIndex(p=>p.pid===pid); }
    _open(seat){ return openCats(this.rule, this.players[seat].scores); }
    _done(p){ return this.rule.cats.every(c=>p.scores[c.id]!==null); }

    _beginTurn(){
      if(this._dead) return;
      this.rollsLeft=3; this.rolled=false;
      this.dice=[0,1,2,3,4].map(()=>({value:0,held:false}));
      const p=this.players[this.current];
      const auto = p.ai || p.connected===false;     // 끊긴 사람도 자동 진행
      this.deadline = auto ? 0 : now()+this.TURN_MS;
      this._busy = !!auto;
      this._emit(); this._armTimer();
      if (auto) setTimeout(()=>this._aiTurn(), 700*this.AID);
    }
    _armTimer(){
      if(this._timer){ clearTimeout(this._timer); this._timer=null; }
      if(this.deadline>0){ const ms=Math.max(0,this.deadline-now())+60; this._timer=setTimeout(()=>this._timeout(), ms); }
    }
    _timeout(){
      if(this._dead||this.phase!=='play') return;
      this._busy=true;
      const seat=this.current, open=this._open(seat);
      const finish=()=>{ if(this._dead)return; const cat=aiPickCat(this.dice.map(d=>d.value),open,this.rule,this.players[seat].scores,this.difficulty,PERSONAS[this.players[seat].persona]); this._busy=false; this._commit(seat,cat); };
      if(!this.rolled){ this._doRoll(); setTimeout(finish, 900); } else finish();
    }
    action(pid,a){
      if(this._dead||this.phase!=='play'||this._busy) return;
      const seat=this._seat(pid);
      if(seat<0||seat!==this.current) return;
      if(a.type==='roll'){ if(this.rollsLeft>0) this._doRoll(); }
      else if(a.type==='hold'){ this._hold(a.i); }
      else if(a.type==='pick'){ this._commit(seat,a.cat); }
    }
    _doRoll(){
      if(this.rollsLeft<=0) return;
      this.rollsLeft--; this.rolled=true;
      const idx=[],vals=[];
      this.dice.forEach((d,i)=>{ if(!d.held){ const v=this._d6(); d.value=v; idx.push(i); vals.push(v); } });
      const cp=this.players[this.current];
      if(!cp.ai && cp.connected!==false){ this.deadline=now()+this.TURN_MS; this._armTimer(); } // 굴릴 때마다 시간 리셋
      this.onRoll(idx,vals);
      this._emit();
    }
    _hold(i){ if(!this.rolled||this.rollsLeft<=0||i<0||i>4) return; this.dice[i].held=!this.dice[i].held; this._emit(); }
    _commit(seat,catId){
      const p=this.players[seat];
      if(!this.rolled||!p||p.scores[catId]!==null||!this.rule.cats.find(c=>c.id===catId)) return;
      p.scores[catId]=scoreOf(catId,this.dice.map(d=>d.value),this.rule);
      if(this.players.every(pp=>this._done(pp))){ this.phase='over'; if(this._timer){clearTimeout(this._timer);this._timer=null;} this._emit(); return; }
      do { this.current=(this.current+1)%this.players.length; } while(this._done(this.players[this.current]));
      this._beginTurn();
    }
    async _aiTurn(){
      if(this._dead||this.phase!=='play') return;
      const seat=this.current, open=this._open(seat);
      const wait=ms=>new Promise(r=>setTimeout(r,ms));
      this._doRoll(); await wait(800*this.AID);
      while(this.rollsLeft>0 && !this._dead){
        const mask=aiHoldMask(this.dice.map(d=>d.value),open,this.rule,this.difficulty,PERSONAS[this.players[seat].persona]);
        if(mask===31) break;
        this.dice.forEach((d,i)=>d.held=!!(mask>>i&1)); this._emit(); await wait(650*this.AID);
        this._doRoll(); await wait(800*this.AID);
      }
      if(this._dead) return;
      const cat=aiPickCat(this.dice.map(d=>d.value),open,this.rule,this.players[seat].scores,this.difficulty,PERSONAS[this.players[seat].persona]);
      await wait(450*this.AID);
      if(this._dead||this.phase!=='play') return;
      this._busy=false; this._commit(seat,cat);
    }
    setConnected(pid,v){ const s=this._seat(pid); if(s>=0 && this.players[s].connected!==v){ this.players[s].connected=v;
      if(!v && s===this.current && this.phase==='play' && !this._busy){ this._busy=true; this.deadline=0; this._armTimer(); setTimeout(()=>this._aiTurn(),500); }
      this._emit(); } }
    skipNow(){ if(this._dead||this.phase!=='play'||this._busy) return; this._busy=true; this.deadline=0; this._armTimer(); setTimeout(()=>this._aiTurn(),250); }

    _upper(p){ return UPPER_IDS.reduce((a,id)=>a+(p.scores[id]||0),0); }
    _bonus(p){ return this.rule.bonus.pts>0 && this._upper(p)>=this.rule.bonus.th ? this.rule.bonus.pts : 0; }
    _total(p){ const low=this.rule.cats.filter(c=>c.sec==='low').reduce((a,c)=>a+(p.scores[c.id]||0),0); return this._upper(p)+this._bonus(p)+low; }
    _preview(){
      if(!this.rolled) return null;
      const d=this.dice.map(x=>x.value), p=this.players[this.current], out={};
      this.rule.cats.forEach(c=>{ if(p.scores[c.id]===null) out[c.id]=scoreOf(c.id,d,this.rule); });
      return out;
    }
    _winners(){
      const arr=this.players.map(p=>({p, t:this._total(p), u:this._upper(p), y:(p.scores.yacht||0)+(p.scores.yahtzee||0)}));
      arr.sort((a,b)=> b.t-a.t || b.u-a.u || b.y-a.y);
      const top=arr[0];
      const tied=arr.filter(x=> x.t===top.t && x.u===top.u && x.y===top.y);
      return { top:top.t, names:tied.map(x=>x.p.name), pids:tied.map(x=>x.p.pid) };
    }
    serialize(){
      return {
        phase:this.phase, mode:this.mode, modeName:this.rule.name,
        cats:this.rule.cats.map(c=>({id:c.id,label:c.label,sec:c.sec})),
        bonus:this.rule.bonus,
        current:this.current, rollsLeft:this.rollsLeft, rolled:this.rolled,
        dice:this.dice.map(d=>({value:d.value,held:d.held})),
        deadline:this.deadline, turnMs:this.TURN_MS, preview:this._preview(),
        players:this.players.map((p,seat)=>({ pid:p.pid, name:p.name, color:p.color, avatar:p.avatar, ai:p.ai, persona:p.persona, personaLabel:p.persona?PERSONAS[p.persona].label:null, connected:p.connected,
          seat, scores:p.scores, upperSum:this._upper(p), bonusGot:this._bonus(p)>0, total:this._total(p) })),
        winners: this.phase==='over' ? this._winners() : null,
      };
    }
    _emit(){ if(!this._dead) this.onState(this.serialize()); }
  }

  return { RULES, GameEngine, scoreOf, openCats };
});
</script>
<script>
(() => {
  const { RULES, GameEngine } = window.GameCore;
  const COLORS=['#aef359','#ff5d8f','#4ec3ff','#ffb14e','#c98bff','#5ee0a8'];
  const AVATARS=['🦊','🐸','🐼','🦁','🐰','🐵'];
  const CHOICES=['🦊','🐸','🐼','🦁','🐰','🐵','🐶','🐱','🐯','🐨','🐷','🐮','🐔','🐧','🐢','🐝','🦉','🦄','🐙','🦖','🤖','👾','😎','👻'];
  const REACTS=['👍','😂','😮','🔥','🎲','😎','😭','🥹','👏','💯','🍀','😱','🤔','🙏'];
  const PHRASES=['나이스!','ㅋㅋㅋ','대박','헐','아깝다','굿!','가자!','운빨ㅋ','오졌다','조졌다'];
  const PIPS={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
  const BASE_TITLE='요트 다이스';
  const $=id=>document.getElementById(id);
  const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  const hexA=(hex,a)=>{const h=(hex||'#888').replace('#','');return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;};
  const LS={get(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},del(k){try{localStorage.removeItem(k);}catch(e){}}};
  const avatar=p=>(p&&p.avatar)?p.avatar:AVATARS[((p&&p.seat)||0)%AVATARS.length];
  const avHTML=(p,o)=>{o=o||{};return `<span class="av ${o.sm?'sm':''} ${o.cur?'cur':''} ${o.off?'off':''}" data-pid="${p.pid}" style="--ring:${p.color};background:${hexA(p.color,.18)}">${esc(avatar(p))}</span>`;};

  // ---------- prefs + stats ----------
  let soundOn=LS.get('yd_sound',true);
  const Stats={ data:LS.get('yd_stats',{games:0,best:0,wins:0,yachts:0}), save(){LS.set('yd_stats',this.data);},
    record(s,mine){ const me=s.players.filter(p=>mine.includes(p.pid)); if(!me.length)return false;
      const myTop=Math.max.apply(null,me.map(p=>p.total)); const beat=myTop>this.data.best;
      this.data.games++; this.data.best=Math.max(this.data.best,myTop);
      const wp=new Set((s.winners&&s.winners.pids)||[]); if(me.some(p=>wp.has(p.pid)))this.data.wins++;
      me.forEach(p=>{if((p.scores.yacht||0)>0)this.data.yachts++;if((p.scores.yahtzee||0)>0)this.data.yachts++;});
      this.save(); renderStats(); return beat; },
    reset(){ this.data={games:0,best:0,wins:0,yachts:0}; this.save(); renderStats(); } };
  function renderStats(){ const el=$('statsbar'); if(!el)return; const d=Stats.data;
    el.innerHTML=`<div class="stat"><b>${d.games}</b><span>플레이</span></div><div class="stat"><b>${d.best}</b><span>최고점</span></div><div class="stat"><b>${d.wins}</b><span>승리</span></div><div class="stat"><b>${d.yachts}</b><span>요트</span></div><span class="reset" id="statReset">초기화</span>`;
    $('statReset').onclick=()=>{ if(confirm('전적을 초기화할까요?'))Stats.reset(); };
  }

  // ---------- sound ----------
  const SFX=(()=>{ let ctx; const ensure=()=>{try{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();}catch(e){}return ctx;};
    function clack(t,vol,freq){const sr=ctx.sampleRate,len=(sr*0.05)|0,buf=ctx.createBuffer(1,len,sr),ch=buf.getChannelData(0);for(let i=0;i<len;i++)ch[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);const src=ctx.createBufferSource();src.buffer=buf;const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=freq;bp.Q.value=1.1;const g=ctx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);src.connect(bp);bp.connect(g);g.connect(ctx.destination);src.start(t);}
    function tone(freq,t,dur,vol,type){const o=ctx.createOscillator(),g=ctx.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+dur+0.03);}
    return { ensure,
      roll(){ if(!soundOn||!ensure())return; const now=ctx.currentTime,n=8+(Math.random()*5|0); for(let k=0;k<n;k++){const f=k/n;clack(now+f*0.6*(0.5+Math.random()*0.9),(0.10+Math.random()*0.16)*(1-f*0.4),1500+Math.random()*1600);} },
      score(){ if(!soundOn||!ensure())return; const t=ctx.currentTime; tone(620,t,0.10,0.13,'square'); tone(930,t+0.06,0.12,0.10,'square'); },
      ding(){ if(!soundOn||!ensure())return; const t=ctx.currentTime; tone(880,t,0.18,0.18,'triangle'); tone(1320,t+0.12,0.22,0.15,'triangle'); },
      win(){ if(!soundOn||!ensure())return; const t=ctx.currentTime; [523,659,784,1047].forEach((f,i)=>tone(f,t+i*0.11,0.32,0.15,'triangle')); },
      big(){ if(!soundOn||!ensure())return; const t=ctx.currentTime; [523,659,784,1047,1319].forEach((f,i)=>tone(f,t+i*0.07,0.42,0.17,'sawtooth')); },
      click(){ if(!soundOn||!ensure())return; const t=ctx.currentTime; const o=ctx.createOscillator(),g=ctx.createGain(); o.type='square'; o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(280,t+0.045); g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.06); o.connect(g);g.connect(ctx.destination); o.start(t); o.stop(t+0.07); } };
  })();

  // ---------- state ----------
  let MODE='local', S=null, myPid=null, localPids=[], eng=null, ws=null, lobby=null;
  let animating=new Set(), animLock=false, animTimer=null, recorded=false, reconnects=0, reconnecting=false, bootReconnect=false;
  let prevSnap=null, gameShown=false, compact=window.innerWidth<560, lastMyTurn=false, titleTimer=null, sawPlay=false, lastReact=0;
  const isOnline=()=>MODE==='online';
  const curPlayer=()=>S&&S.players[S.current];
  const spectating=()=>isOnline()&&S&&!S.players.some(p=>p.pid===myPid);
  function isMyTurn(){ if(!S||S.phase!=='play')return false; const c=curPlayer(); if(!c)return false; return isOnline()?c.pid===myPid:!c.ai; }
  const canAct=()=>isMyTurn()&&!animLock;
  const amHost=()=>lobby&&lobby.members&&lobby.members.some(m=>m.host&&m.pid===myPid);
  function sendAction(a){ if(isOnline())wsSend({t:'action',a}); else if(eng)eng.action(eng.players[eng.current].pid,a); }

  // ---------- avatar picker ----------
  function openAvatarPicker(cur,onPick){ const g=$('avGrid'); g.innerHTML='';
    CHOICES.forEach(e=>{const b=document.createElement('button');b.textContent=e;if(e===cur)b.classList.add('on');b.onclick=()=>{onPick(e);$('avOv').classList.remove('show');};g.appendChild(b);});
    $('avOv').classList.add('show'); }
  $('avClose').onclick=()=>$('avOv').classList.remove('show');

  // ---------- turn alert ----------
  function startBlink(){ if(titleTimer)return; let on=false; titleTimer=setInterval(()=>{on=!on;document.title=on?'🎲 내 차례!':BASE_TITLE;},700); }
  function stopBlink(){ if(titleTimer){clearInterval(titleTimer);titleTimer=null;} document.title=BASE_TITLE; }
  window.addEventListener('focus',stopBlink);
  function notifyTurn(){ SFX.ding(); try{navigator.vibrate&&navigator.vibrate(180);}catch(e){} if(!document.hasFocus())startBlink(); }

  // ---------- dice ----------
  const diceEl=$('dice2d'), keptEl=$('keptrow');
  function tactile(){ SFX.click(); try{navigator.vibrate&&navigator.vibrate(15);}catch(e){} }
  function makeDie(d,i,anim){ const el=document.createElement('div'); el.className='d2'; el.dataset.i=i;
    if(anim){ el.classList.add('toss'); el.style.setProperty('--r',(Math.random()<.5?'-':'')+(120+(Math.random()*120|0))+'deg'); el.style.animationDelay=(i*0.04)+'s'; }
    if(!d.value&&!anim)el.classList.add('blank'); if(d.held)el.classList.add('held','kept');
    const on=(d.value&&!anim)?PIPS[d.value]:[];
    for(let k=0;k<9;k++){const c=document.createElement('span');c.className='c';if(on.indexOf(k)>=0){const p=document.createElement('span');p.className='p';c.appendChild(p);}el.appendChild(c);}
    if(d.held){ const pin=document.createElement('span'); pin.className='pin'; pin.textContent='🔒'; el.appendChild(pin); }
    const act=canAct()&&S.rolled&&S.rollsLeft>0&&!anim;
    if(act)el.onclick=()=>{ tactile(); sendAction({type:'hold',i}); }; else el.classList.add('lock');
    return el;
  }
  let prevHeld=new Set();
  function renderDice2D(){ if(!S){diceEl.innerHTML='';keptEl.innerHTML='';prevHeld=new Set();return;}
    const old={}; document.querySelectorAll('#dice2d .d2,#keptrow .d2').forEach(el=>{ old[el.dataset.i]=el.getBoundingClientRect(); });
    diceEl.innerHTML=''; keptEl.innerHTML=''; const heldNow=new Set();
    const items=S.dice.map((d,i)=>({d,i}));
    items.filter(o=>!o.d.held).forEach(o=>{ diceEl.appendChild(makeDie(o.d,o.i,animating.has(o.i))); });
    items.filter(o=>o.d.held).sort((a,b)=>(a.d.value-b.d.value)||(a.i-b.i)).forEach(o=>{ keptEl.appendChild(makeDie(o.d,o.i,animating.has(o.i))); heldNow.add(o.i); });
    const lbl=$('keptLbl'); if(lbl)lbl.textContent=`킵 ${heldNow.size}/5`;
    if(!animLock){ document.querySelectorAll('#dice2d .d2,#keptrow .d2').forEach(el=>{ const o=old[el.dataset.i];
      if(o){ const n=el.getBoundingClientRect(); const dx=o.left-n.left, dy=o.top-n.top;
        if(Math.abs(dx)>1||Math.abs(dy)>1){ el.style.transition='none'; el.style.transform=`translate(${dx}px,${dy}px)`; el.getBoundingClientRect(); el.classList.add('flip'); el.style.transition=''; el.style.transform=''; } }
      if(heldNow.has(+el.dataset.i)&&!prevHeld.has(+el.dataset.i))el.classList.add('justheld');
    }); }
    prevHeld=heldNow;
  }
  function onRoll(indices){ animLock=true; animating=new Set(indices); SFX.roll(); renderDice2D(); renderTurn();
    clearTimeout(animTimer); animTimer=setTimeout(()=>{ animating.clear(); animLock=false; renderGame(); }, 700);
  }

  // ---------- render ----------
  function renderGame(skipDice){ renderTurn(); if(!skipDice)renderDice2D(); renderSheet(); }
  function renderTurn(){ if(!S)return; const p=curPlayer(); if(!p)return; const spec=spectating();
    $('specBar').style.display=spec?'flex':'none';
    const bn=$('turnBanner'); if(bn){ const mine=isMyTurn(); bn.style.display='flex'; bn.className='turnbanner '+(mine?'me':'other');
      bn.innerHTML=avHTML(p,{cur:true,off:!p.connected})+`<span class="nm">${esc(p.name)}</span>`+(p.ai?'<span class="aitag">AI '+esc(p.personaLabel||'')+'</span>':'')+(mine?'<span>— 내 차례!</span>':'<span style="color:var(--muted);font-weight:600">차례</span>')+(!p.connected?' <span class="aitag" style="background:var(--danger);color:#fff">끊김·AI진행</span>':''); }
    const rp=$('rollPips'); rp.innerHTML=''; for(let i=0;i<3;i++){const d=document.createElement('i');if(i<S.rollsLeft)d.classList.add('live');rp.appendChild(d);}
    const me=canAct(), rb=$('rollBtn'); rb.disabled=!me||S.rollsLeft<=0; rb.style.display=spec?'none':'block';
    rb.textContent=p.ai?'AI가 굴리는 중…':(!S.rolled?'굴리기':(S.rollsLeft>0?`다시 굴리기 (${S.rollsLeft})`:'굴림 끝'));
    const sk=$('skipBtn'); if(sk){ const show=isOnline()&&amHost()&&S.phase==='play'&&p.pid!==myPid; sk.style.display=show?'flex':'none'; }
    const eb=$('endBtn'); if(eb){ eb.style.display=(isOnline()&&amHost()&&S.phase==='play')?'flex':'none'; }
    const h=$('hint');
    if(spec)h.textContent='관전 중이에요. 다음 판이 시작되면 함께 플레이해요.';
    else if(p.ai)h.textContent='AI가 플레이하고 있어요…';
    else if(!p.connected)h.textContent=`${p.name} 접속이 끊겨 AI가 대신 진행 중…`;
    else if(!isMyTurn())h.textContent=`${p.name}의 차례를 기다리는 중…`;
    else if(!S.rolled)h.textContent='주사위를 굴려 시작하세요. (Space=굴리기, 1~5=고정)';
    else if(S.rollsLeft>0)h.textContent='주사위를 탭/숫자키로 고정하거나, 점수 칸을 선택하세요.';
    else h.textContent='점수 칸을 선택하세요.';
  }
  function cell(p,pi,catId){ const v=p.scores[catId], cur=pi===S.current?'col-current':'';
    if(v!==null)return `<td class="val ${cur}" data-p="${pi}" data-c="${catId}">${v}</td>`;
    if(pi===S.current&&S.rolled&&S.preview){ const prev=S.preview[catId], click=canAct();
      return `<td class="preview ${cur} ${prev===0?'zero':''} ${click?'':'lock'}" ${click?`data-cat="${catId}"`:''}>${prev}</td>`; }
    return `<td class="empty ${cur}">·</td>`;
  }
  function renderSheet(){ if(!S)return;
    let cols=S.players.map((p,pi)=>pi);
    if(compact && S.players.length>2){ cols=cols.filter(pi=>pi===S.current||(isOnline()&&S.players[pi].pid===myPid)); if(!cols.length)cols=[S.current]; }
    if(isOnline()){ const mi=S.players.findIndex(p=>p.pid===myPid); if(mi>=0)cols=[mi,...cols.filter(x=>x!==mi)]; }
    let h='<thead><tr><th class="catcol"></th>';
    cols.forEach(pi=>{const p=S.players[pi]; const meC=isOnline()&&p.pid===myPid?'me-col':''; h+=`<th class="${pi===S.current?'col-current':''} ${meC}"><div class="hav">${avHTML(p,{sm:true,cur:pi===S.current,off:!p.connected})}<span class="hnm">${esc(p.name)}</span></div></th>`;});
    h+='</tr></thead><tbody>';
    S.cats.filter(c=>c.sec==='up').forEach(c=>{h+=`<tr><td class="catcol">${esc(c.label)}</td>${cols.map(pi=>cell(S.players[pi],pi,c.id)).join('')}</tr>`;});
    if(S.bonus.pts>0)h+=`<tr class="bonus"><td class="catcol">보너스 (${S.bonus.th}↑)</td>${cols.map(pi=>{const p=S.players[pi];return `<td class="${pi===S.current?'col-current':''}">${p.bonusGot?'+'+S.bonus.pts:p.upperSum+'/'+S.bonus.th}</td>`;}).join('')}</tr>`;
    S.cats.filter(c=>c.sec==='low').forEach(c=>{h+=`<tr><td class="catcol">${esc(c.label)}</td>${cols.map(pi=>cell(S.players[pi],pi,c.id)).join('')}</tr>`;});
    h+=`<tr class="total"><td class="catcol">합계</td>${cols.map(pi=>{const p=S.players[pi];return `<td class="${pi===S.current?'col-current':''}">${p.total}</td>`;}).join('')}</tr></tbody>`;
    $('sheet').innerHTML=h;
    $('sheet').querySelectorAll('td.preview[data-cat]').forEach(td=>{td.onclick=()=>askPick(td.dataset.cat);});
  }

    renderMembers();
    const start=$('startOnline'); start.style.display=amHost()?'block':'none'; start.disabled=lobby.members.length<2;
    $('lobbyWait').textContent=amHost()?(lobby.members.length<2?'친구가 방 코드로 참가하면 시작할 수 있어요.':''):'호스트가 시작하기를 기다리는 중…';
  }
  function renderMembers(){ const box=$('members'); box.innerHTML='';
    lobby.members.forEach((u,i)=>{ const d=document.createElement('div'); d.className='member'+(u.connected?'':' off');
      const right=document.createElement('span'); right.style.cssText='margin-left:auto;display:flex;gap:6px;align-items:center';
      if(u.waiting){const wt=document.createElement('span');wt.className='aitag';wt.style.background='var(--ai)';wt.textContent='대기';right.appendChild(wt);}
      if(u.host){const hs=document.createElement('span');hs.className='host';hs.textContent='HOST';right.appendChild(hs);}
      if(amHost()&&u.ai){const rm=document.createElement('button');rm.className='rm';rm.textContent='✕';rm.onclick=()=>wsSend({t:'removeAI',pid:u.pid});right.appendChild(rm);}
      d.innerHTML=avHTML({pid:u.pid,color:u.color,seat:i,avatar:u.avatar},{sm:true,off:!u.connected})+`<span class="conn ${u.connected?'':'off'}"></span><span class="mname">${esc(u.name)}${u.pid===myPid?' <span class="youtag">나</span>':''}${u.ai?' <span class="aitag">AI</span>':''}</span>`;
      d.appendChild(right);
      if(u.pid===myPid){const a=d.querySelector('.av'); if(a){a.style.cursor='pointer';a.title='캐릭터 선택';a.onclick=()=>openAvatarPicker(u.avatar,e=>wsSend({t:'setAvatar',emoji:e}));}}
      box.appendChild(d);
    });
  }
  $('renameBtn').onclick=()=>{const n=($('lobbyName').value||'').trim();if(n)wsSend({t:'rename',name:n});};
  $('lobbyName').addEventListener('keydown',e=>{if(e.key==='Enter')$('renameBtn').onclick();});
  $('avatarBtn').onclick=()=>{ const me=lobby&&lobby.members.find(u=>u.pid===myPid); openAvatarPicker(me&&me.avatar,e=>wsSend({t:'setAvatar',emoji:e})); };
  $('addAiBtn').onclick=()=>{ if(amHost())wsSend({t:'addAI'}); };
  $('startOnline').onclick=()=>{ if(amHost())wsSend({t:'start'}); };
  $('copyCode').onclick=()=>{ if(lobby)copyText(lobby.code); };
  $('copyLink').onclick=()=>{ if(lobby)copyText(location.origin+location.pathname+'?room='+lobby.code); };

  // ========== in-game controls ==========
  function syncMute(){ const b=$('muteBtn'); if(b)b.textContent=soundOn?'🔊':'🔇'; }
  $('muteBtn').onclick=()=>{ soundOn=!soundOn; LS.set('yd_sound',soundOn); syncMute(); $('soundToggle').classList.toggle('on',soundOn); };
  $('leaveBtn').onclick=()=>{ if(confirm('게임에서 나갈까요?'))leave(); };
  $('skipBtn').onclick=()=>{ if(isOnline()&&amHost())wsSend({t:'skip'}); };
  $('endBtn').onclick=()=>{ if(isOnline()&&amHost()&&confirm('이 판을 끝내고 모두 로비로 돌아갈까요?'))wsSend({t:'endGame'}); };
  $('rollBtn').onclick=()=>{ if(canAct()&&S.rollsLeft>0){ SFX.ensure(); sendAction({type:'roll'}); } };
  $('compactBtn').onclick=()=>{ compact=!compact; $('compactBtn').classList.toggle('on',compact); $('compactBtn').textContent=compact?'전체':'간략히'; renderSheet(); };
  $('compactBtn').classList.toggle('on',compact); $('compactBtn').textContent=compact?'전체':'간략히';
  syncMute();
  document.addEventListener('keydown',e=>{ if($('game').style.display!=='block')return; if(/INPUT|TEXTAREA/.test(e.target.tagName))return; if(!canAct())return;
    if(e.code==='Space'){ e.preventDefault(); if(S.rollsLeft>0){SFX.ensure();sendAction({type:'roll'});} }
    else if(/^(Digit|Numpad)[1-5]$/.test(e.code)){ const i=+e.code.slice(-1)-1; if(S.rolled&&S.rollsLeft>0)sendAction({type:'hold',i}); }
  });

  // ========== transparency + electron ==========
  const op=$('opacity');
  function applyOpacity(pct){ const v=Math.max(.1,Math.min(1,pct/100));
    if(window.electronAPI&&window.electronAPI.setOpacity){ window.electronAPI.setOpacity(v); document.documentElement.style.setProperty('--ui',1); }
    else { document.documentElement.style.setProperty('--ui',v.toFixed(2)); }
    LS.set('yd_op',Math.round(v*100)); }
  if(op){ const saved=+LS.get('yd_op',100); op.value=saved; applyOpacity(saved);
    op.addEventListener('input',e=>applyOpacity(+e.target.value)); }
  if(window.electronAPI){ document.querySelectorAll('.wbtn').forEach(b=>b.style.display='flex');
    const pin=$('winPin'); if(pin)pin.onclick=async()=>{const v=await window.electronAPI.pin();pin.classList.toggle('on',v);};
    const wm=$('winMin'); if(wm)wm.onclick=()=>window.electronAPI.minimize();
    const wc=$('winClose'); if(wc)wc.onclick=()=>window.electronAPI.close();
  }

  // ========== boot ==========
  const THEMES=[['dark','다크'],['neon','네온'],['felt','펠트']];
  let theme=LS.get('yd_theme','dark');
  function applyTheme(t){ theme=t; document.documentElement.dataset.theme=t; LS.set('yd_theme',t); const box=$('themeChips'); if(box)[...box.children].forEach(c=>c.classList.toggle('on',c.dataset.t===t)); }
  applyTheme(theme);
  (function(){ const box=$('themeChips'); if(!box)return; THEMES.forEach(([id,label])=>{const b=document.createElement('button');b.textContent=label;b.dataset.t=id;if(id===theme)b.classList.add('on');b.onclick=()=>applyTheme(id);box.appendChild(b);}); })();
  renderStats();
  (function(){ const room=LS.get('yd_room'),pid=LS.get('yd_pid');
    if(room&&pid&&location.protocol!=='file:'){ bootReconnect=true; reconnecting=true; reconnects=0; connect(()=>wsSend({t:'rejoin',code:room,pid})); return; }
    const ur=(new URLSearchParams(location.search)).get('room');
    if(ur){ switchTab(false); $('joinBox').style.display='block'; $('joinCode').value=ur.toUpperCase(); }
  })();
})();
</script>
</body>
</html>
